<section class="admission-hero">

    <h1>BCC CLASSES</h1>

    <h2>प्रवेश प्रक्रिया</h2>

    <p>
        इयत्ता ७ वी ते १० वी<br>
        विज्ञान बॅचसाठी प्रवेश सुरू
    </p>

</section>


<section class="admission-section">

   <section class="admission-section">


<div class="admission-form-box">

    <h2>प्रवेश अर्ज</h2>

    <form onsubmit="sendAdmission(); return false;">

        <input
        type="text"
        id="studentName"
        placeholder="विद्यार्थ्याचे पूर्ण नाव"
        required>

        <input
        type="date"
        id="dob"
        required>

        <select
        id="studentClass"
        required>

            <option value="">
                इयत्ता निवडा
            </option>

            <option>इयत्ता ७ वी</option>
            <option>इयत्ता ८ वी</option>
            <option>इयत्ता ९ वी</option>
            <option>इयत्ता १० वी</option>

        </select>

        <input
        type="tel"
        id="mobile"
        placeholder="मोबाईल नंबर"
        required>

        <input
        type="text"
        id="parentName"
        placeholder="पालकांचे नाव"
        required>

        <textarea
        rows="4"
        id="address"
        placeholder="पत्ता"></textarea>

        <textarea
        rows="5"
        id="extraInfo"
        placeholder="अतिरिक्त माहिती"></textarea>

        <div class="admission-buttons">

            <button
            type="submit"
            class="submit-btn">

                प्रवेशासाठी अर्ज करा

            </button>

            <button
            type="reset"
            class="reset-btn">

                रीसेट

            </button>

        </div>

    </form>

</div>


</section>

<script>

function sendAdmission(){

    let studentName = document.getElementById("studentName").value;
    let dob = document.getElementById("dob").value;
    let studentClass = document.getElementById("studentClass").value;
    let mobile = document.getElementById("mobile").value;
    let parentName = document.getElementById("parentName").value;
    let address = document.getElementById("address").value;
    let extraInfo = document.getElementById("extraInfo").value;

    let text =
    "🎓 BCC नवीन प्रवेश अर्ज%0A%0A" +
    "विद्यार्थी: " + studentName +
    "%0Aजन्मतारीख: " + dob +
    "%0Aइयत्ता: " + studentClass +
    "%0Aमोबाईल: " + mobile +
    "%0Aपालक: " + parentName +
    "%0Aपत्ता: " + address +
    "%0Aअतिरिक्त माहिती: " + extraInfo;

    window.open(
    "https://wa.me/919767192091?text=" + text,
    "_blank"
    );
}

</script>
