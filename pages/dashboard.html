<!DOCTYPE html>

<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCC Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:20px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.top-bar h1{
    color:#d40000;
}

.logout-btn{
    background:red;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

.profile-card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:25px;
}

.profile-card img{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
}

.details h2{
    color:#d40000;
    margin-bottom:10px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.card h3{
    color:#d40000;
    margin-bottom:10px;
}

.card p{
    margin-bottom:15px;
}

.card button{
    background:#d40000;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

@media(max-width:768px){

    .profile-card{
        flex-direction:column;
        text-align:center;
    }

}

</style>

</head>

<body>

<div class="top-bar">


<h1>BCC Dashboard</h1>

<button
class="logout-btn"
onclick="logout()">
    🚪 Logout
</button>


</div>

<div class="profile-card">


<img
id="studentPhoto"
src="https://via.placeholder.com/100"
alt="Student Photo">

<h2 id="studentName">Loading...</h2>

<p>
<b>Username:</b>
<span id="studentUsername">-</span>
</p>

<p>
<b>Class:</b>
<span id="studentClass">-</span>
</p>

<p>
<b>Mobile:</b>
<span id="studentMobile">-</span>
</p>

<p>
<b>Parent Name:</b>
<span id="studentParent">-</span>
</p>


</div>

<div class="cards">

```
<div class="card">

    <h3>📊 MARKS</h3>

    <p>Latest Exam Results</p>

    <button>तपासा</button>

</div>

<div class="card">

    <h3>📅 ATTENDANCE</h3>

    <p>Present / Absent Report</p>

    <button>तपासा</button>

</div>

<div class="card">

    <h3>📝 STUDENT NOTE</h3>

    <p>अभ्यास चांगला आहे.</p>

    <button>तपासा</button>

</div>

<div class="card">

<h3>💰 FEES STATUS</h3>

<p>Pending</p>

<button>तपासा</button>

</div>

<div class="card">

<h3>📢 NOTICE</h3>

<p>नवीन सूचना</p>

<button>तपासा</button>

</div>
```

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-JtY_GeuRAwiIepfG8xTx_S8ZR9gFXeM",
  authDomain: "bcc-classes-78a51.firebaseapp.com",
  projectId: "bcc-classes-78a51",
  storageBucket: "bcc-classes-78a51.firebasestorage.app",
  messagingSenderId: "1016779208857",
  appId: "1:1016779208857:web:df9e06477630cc6068e008"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const currentUser =
localStorage.getItem("currentUser");

document.getElementById(
"studentUsername"
).innerText = currentUser;
async function loadStudent(){

const querySnapshot =
await getDocs(collection(db,"students"));

querySnapshot.forEach((doc)=>{

const data = doc.data();

if(data.username === currentUser){
    console.log("Firestore Data =", data);

document.getElementById(
"studentName"
).innerText = data.fullName;

document.getElementById(
"studentClass"
).innerText = data.class;

document.getElementById(
"studentMobile"
).innerText = data.mobile;

document.getElementById(
"studentParent"
).innerText = data.parent;

}

});

}
console.log("Current User =", currentUser);
alert(currentUser);
loadStudent();

onAuthStateChanged(auth,(user)=>{

    if(!user){

        window.location.href =
        "login.html";

    }

});

window.logout = function(){

    localStorage.removeItem(
        "currentUser"
    );

    signOut(auth)

    .then(()=>{

        window.location.href =
        "login.html";

    });

}
