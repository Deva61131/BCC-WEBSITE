<!DOCTYPE html>

<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | BCC Classes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#000,#1a1a1a,#8b0000);
}

.admin-box{
    width:400px;
    max-width:90%;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.admin-box h1{
    text-align:center;
    color:#d40000;
    margin-bottom:25px;
}

.input-box{
    position:relative;
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
}

.eye-btn{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    user-select:none;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#d47f00;
    color:rgb(255, 255, 255);
    font-size:16px;
    cursor:pointer;
}

.login-btn:hover{
    background:#a85100;
}

.info{
    text-align:center;
    margin-top:15px;
    color:#555;
}

</style>

</head>

<body>

<div class="admin-box">

```
<h1>🔐 Admin Login</h1>

<form onsubmit="loginAdmin(); return false;">

    <div class="input-box">
        <input
        type="text"
        id="username"
        placeholder="Username"
        required>
    </div>

    <div class="input-box">

        <input
        type="password"
        id="password"
        placeholder="Password"
        required>

        <span
        class="eye-btn"
        onclick="togglePassword()">
            👁️
        </span>

    </div>

    <button
    type="submit"
    class="login-btn">
        Login
    </button>

</form>

<p class="info">
    BCC Classes Admin Panel
</p>
```

</div>

<script>

function togglePassword(){

    let password =
    document.getElementById("password");

    if(password.type==="password"){
        password.type="text";
    }else{
        password.type="password";
    }

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-JtY_GeuRAwiIepfG8xTx_S8ZR9gFXeM",
  authDomain: "bcc-classes-78a51.firebaseapp.com",
  projectId: "bcc-classes-78a51",
  storageBucket: "bcc-classes-78a51.firebasestorage.app",
  messagingSenderId: "1016779208857",
  appId: "1:1016779208857:web:df9e06477630cc6068e008"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginAdmin = function(){

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    const email =
    username + "@bcc.com";

    signInWithEmailAndPassword(
        auth,
        email,
        password
    )

    .then(() => {

        alert("Admin Login Successful");

        window.location.href =
        "admin-dashboard.html";

    })

    .catch(() => {

        alert(
        "Wrong Username or Password"
        );

    });

}
import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

onAuthStateChanged(auth, (user) => {

```
if(user){

    window.location.href =
    "dashboard.html";

}
```

});


</script>

</body>
</html>
